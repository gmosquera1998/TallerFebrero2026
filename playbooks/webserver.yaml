---
- hosts: ubuntu
  become: true

  tasks:
    - name: Deploy Python systemd unit file
      ansible.builtin.template:
        src: ../templates/shared-http.service.j2
        dest: /etc/systemd/system/shared-http.service
        mode: '0644'
      notify: Restart shared-http

    - name: Ensure shared-http is started and enabled
      ansible.builtin.systemd_service:
        name: shared-http
        state: started
        enabled: true
        daemon_reload: true

  handlers:
    - name: Restart shared-http
      ansible.builtin.systemd_service:
        name: shared-http
        state: restarted
