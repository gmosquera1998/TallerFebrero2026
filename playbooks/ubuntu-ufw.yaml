---
- hosts: ubuntu
  become: true
  tasks:
    - name: Install UFW
      ansible.builtin.apt:
        name: ufw
        state: present

    - name: Allow SSH
      community.general.ufw:
        rule: allow
        name: OpenSSH

    - name: Allow Python Webserver port
      community.general.ufw:
        rule: allow
        port: '8080'
        proto: tcp

    - name: Enable UFW
      community.general.ufw:
        state: enabled
        policy: deny
